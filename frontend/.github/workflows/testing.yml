name: CI - Tests Angular Liga Deportiva

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Angular Karma ────────────────────────────────────────────
  angular-tests:
    name: Angular — Unit + Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Tests Angular
        run: npx ng test --watch=false --browsers=ChromeHeadless

  # ── Cypress E2E ──────────────────────────────────────────────
  cypress-e2e:
    name: Cypress — E2E Tests
    runs-on: ubuntu-latest
    needs: [angular-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Iniciar Angular en background
        run: npx ng serve &

      - name: Esperar a que Angular esté listo
        run: npx wait-on http://localhost:4200 --timeout 60000

      - name: Ejecutar Cypress
        run: npx cypress run --headless --browser chrome

      - name: Subir capturas si falla
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots