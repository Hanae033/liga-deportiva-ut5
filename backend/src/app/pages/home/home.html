<section class="p-5 mb-4 bg-dark text-light rounded-4">
  <div class="row align-items-center">
    <div class="col-md-7">
      <h1 class="display-6">Liga Deportiva del Instituto</h1>
      <p class="lead">Proyecto Angular + MongoDB</p>
      <a routerLink="/competiciones" class="btn btn-info mt-2">Ver competiciones</a>
    </div>
    <div class="col-md-5 d-none d-md-block text-center">
      <img src="https://cdn-icons-png.flaticon.com/512/861/861512.png" class="img-fluid" width="200">
    </div>
  </div>
</section>

<section>
  <h3 class="mb-3">Competiciones</h3>
  <div class="row g-3">
    <div class="col-md-3 col-6" *ngFor="let d of deportes">
      <div class="card h-100 shadow-sm text-center">
        <div class="card-body">
          <h5>{{d}}</h5>
        </div>
      </div>
    </div>
  </div>
</section>
