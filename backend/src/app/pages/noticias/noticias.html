<h2 class="mb-3">Noticias recientes</h2>

<div class="row g-3">
  <div class="col-md-4" *ngFor="let n of noticias">
    <div class="card h-100 shadow-sm">
      <div class="card-body">
        <h5>{{n.titulo}}</h5>
        <p class="text-muted">{{n.texto}}</p>
        <span class="badge bg-info">{{n.fecha}}</span>
      </div>
    </div>
  </div>
</div>
