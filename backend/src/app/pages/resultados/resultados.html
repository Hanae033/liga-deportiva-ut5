<h2 class="mb-3">Resultados</h2>

<table class="table table-dark table-striped">
  <thead>
    <tr>
      <th>Deporte</th>
      <th>Partido</th>
      <th>Resultado</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let r of resultados">
      <td>{{r.dep}}</td>
      <td>{{r.partido}}</td>
      <td>{{r.resultado}}</td>
    </tr>
  </tbody>
</table>
